name: 24/7 News Auto Bot

on:
  schedule:
    # 깃허브 무료 서버의 정각 병목현상을 피하기 위해 매시 45분에 실행합니다.
    - cron: '45 * * * *'
  workflow_dispatch: # 수동 테스트를 위한 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
        
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 필수 라이브러리 설치
        run: |
          pip install requests beautifulsoup4 feedparser
          
      - name: 백그라운드 봇 실행
        env:
          # 깃허브 Settings -> Secrets에 저장해둔 토큰을 안전하게 불러와서 파이썬에 전달합니다.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python background_bot.py
