name: 24/7 News Auto Bot

on:
  schedule:
    # 정각 트래픽을 피해 매시간 45분에 실행되도록 변경
    - cron: '45 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4  # 👈 v3에서 v4로 최신화 완료!
        
      - name: 파이썬 설치
        uses: actions/setup-python@v5 # 👈 v4에서 v5로 최신화 완료!
        with:
          python-version: '3.10'
          
      - name: 필수 라이브러리 설치
        run: |
          pip install requests beautifulsoup4 feedparser
          
      - name: 백그라운드 봇 실행
        run: python background_bot.py
